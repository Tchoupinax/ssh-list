name: Prepare next release 🚀

on:
  push:
    branches:
    - master

jobs:
  build:
    name: Run release draft to extract labels ☕️
    runs-on: ubuntu-latest
    steps:
      - name: Run release draft to extract labels ☕️
        uses: tchoupinax/repo-config/shared-actions/dx/prepare-draft-release@abded2407e798f8ccead69057d2d33a3b87635ef
        with:
          appId: ${{ secrets.DEPLOY_APP_ID }}
          privateKey: ${{ secrets.DEPLOY_APP_KEY }}
