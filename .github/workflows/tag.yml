name: Release

on:
  push:
    tags:
      - "*"

jobs:
  release:
    name: Release project 🚀
    runs-on: ubuntu-latest
    steps:
      - name: Release project 🚀
        uses: tchoupinax/repo-config/shared-actions/golang/goreleaser-release@abded2407e798f8ccead69057d2d33a3b87635ef
        with:
          appId: ${{ secrets.DEPLOY_APP_ID }}
          privateKey: ${{ secrets.DEPLOY_APP_KEY }}

  brew-update:
    name: Update Brew registry 👊
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Update Brew registry 👊
        uses: tchoupinax/repo-config/shared-actions/dx/update-brew-registry@abded2407e798f8ccead69057d2d33a3b87635ef
        with:
          patToken: ${{ secrets.BREW_COMITTER_PAT }}
          formulaPath: ssh-list.rb
